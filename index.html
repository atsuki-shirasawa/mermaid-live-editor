<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
    <title>Mermaid Editor</title>
    <meta
      name="description"
      content="ブラウザで Mermaid 図を編集・プレビューし、SVG / PNG で画像出力できる静的エディタ。"
    />
    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Mermaid Editor" />
    <meta
      property="og:description"
      content="ブラウザで Mermaid 図を編集・プレビュー・画像出力"
    />
    <meta
      property="og:url"
      content="https://atsuki-shirasawa.github.io/mermaid-live-editor/"
    />
    <meta
      property="og:image"
      content="https://atsuki-shirasawa.github.io/mermaid-live-editor/og-image.png"
    />
    <meta property="og:image:width" content="2560" />
    <meta property="og:image:height" content="1280" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Mermaid Editor" />
    <meta
      name="twitter:description"
      content="ブラウザで Mermaid 図を編集・プレビュー・画像出力"
    />
    <meta
      name="twitter:image"
      content="https://atsuki-shirasawa.github.io/mermaid-live-editor/og-image.png"
    />
    <script>
      // 描画前に UI テーマと図テーマ（キャンバス背景）を確定してフラッシュを防ぐ
      (function () {
        try {
          var s = JSON.parse(
            localStorage.getItem("mermaid-editor:settings") || "{}",
          );
          var t =
            s.uiTheme ||
            (window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark");
          document.documentElement.dataset.theme = t;
          // 図テーマ既定は dark（DEFAULT_SETTINGS と一致）。dark のみ暗色キャンバス。
          var d = s.diagramTheme || s.theme || "dark";
          document.documentElement.dataset.diagram =
            d === "dark" ? "dark" : "light";
        } catch (e) {
          document.documentElement.dataset.theme = "dark";
          document.documentElement.dataset.diagram = "dark";
        }
      })();
    </script>
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" data-icon="logo"></span>
        <h1 class="wordmark">Mermaid<span>Editor</span></h1>
      </div>
      <div class="actions">
        <a
          href="https://github.com/atsuki-shirasawa/mermaid-live-editor"
          class="icon-btn"
          target="_blank"
          rel="noopener noreferrer"
          data-icon="github"
          aria-label="GitHub リポジトリを開く"
          title="GitHub"
        ></a>
        <button
          id="btn-theme"
          type="button"
          class="icon-btn"
          aria-label="表示テーマを切り替える"
        ></button>
        <button
          id="btn-settings"
          type="button"
          class="icon-btn"
          data-icon="settings"
          aria-label="設定を開く"
          title="設定"
        ></button>
        <button id="btn-export" type="button" class="btn" title="画像を出力">
          <span class="btn-icon" data-icon="image"></span>
          出力
          <kbd id="export-kbd" class="kbd"></kbd>
        </button>
      </div>
    </header>

    <main class="layout">
      <section class="editor-pane">
        <div class="pane-toolbar">
          <div class="pane-tabs">
            <span class="pane-tab is-active">
              <span class="pane-tab-icon" data-icon="code"></span>Code
            </span>
          </div>
          <a
            class="pane-link"
            href="https://mermaid.js.org/intro/"
            target="_blank"
            rel="noopener noreferrer"
          >
            <span class="pane-tab-icon" data-icon="book"></span>Docs
          </a>
        </div>
        <div id="editor" aria-label="Mermaid コード"></div>
        <div id="samples" class="samples">
          <button
            id="samples-toggle"
            type="button"
            class="samples-head"
            aria-expanded="true"
          >
            <span class="label">
              <span class="pane-tab-icon" data-icon="shapes"></span>サンプル図
            </span>
            <span class="chevron" data-icon="chevron-down"></span>
          </button>
          <div id="samples-body" class="samples-body"></div>
        </div>
      </section>
      <div
        id="splitter"
        class="splitter"
        role="separator"
        aria-label="ペイン幅を調整"
      ></div>
      <section id="preview-pane" class="preview-pane">
        <div class="pane-toolbar">
          <div class="pane-tabs">
            <span class="pane-tab is-active">
              <span class="pane-tab-icon" data-icon="eye"></span>Diagram
            </span>
          </div>
          <div class="zoom-controls">
            <button
              id="zoom-out"
              type="button"
              class="icon-btn"
              data-icon="minus"
              aria-label="縮小"
              title="縮小"
            ></button>
            <button
              id="zoom-level"
              type="button"
              class="zoom-level"
              aria-label="ズーム倍率（クリックで等倍）"
              title="クリックで 100%"
            >
              100%
            </button>
            <button
              id="zoom-in"
              type="button"
              class="icon-btn"
              data-icon="plus"
              aria-label="拡大"
              title="拡大"
            ></button>
            <button
              id="zoom-reset"
              type="button"
              class="icon-btn"
              data-icon="maximize"
              aria-label="画面に合わせる"
              title="画面に合わせる（ダブルクリックでも可）"
            ></button>
          </div>
        </div>
        <div class="preview-scroll">
          <div id="preview" class="preview"></div>
          <div id="empty-state" class="empty-state" hidden>
            <span class="empty-icon" data-icon="shapes"></span>
            <p class="empty-title">プレビューはここに表示されます</p>
            <p class="empty-desc">
              左のコード欄に Mermaid を入力するか、サンプル図を選んでください。
            </p>
            <button id="empty-sample" type="button" class="btn btn-ghost">
              <span class="btn-icon" data-icon="shuffle"></span>
              ランダムにサンプルを表示
            </button>
          </div>
        </div>
        <div class="render-bar" aria-hidden="true"></div>
        <div id="error" class="error" role="alert" hidden></div>
      </section>
    </main>

    <!-- 設定ドロワー -->
    <div id="backdrop" class="backdrop" hidden></div>
    <aside id="settings" class="drawer" hidden tabindex="-1" aria-label="設定">
      <div class="drawer-head">
        <h2>設定</h2>
        <button
          id="settings-close"
          type="button"
          class="icon-btn"
          data-icon="x"
          aria-label="閉じる"
        ></button>
      </div>

      <div class="field">
        <label for="set-theme">図のテーマ</label>
        <select id="set-theme">
          <option value="default">Light</option>
          <option value="dark">Dark</option>
          <option value="forest">Forest</option>
          <option value="neutral">Neutral</option>
        </select>
      </div>

      <div class="field">
        <label for="set-fontsize">
          図のフォントサイズ
          <span id="fontsize-value" class="field-value"></span>
        </label>
        <input id="set-fontsize" type="range" min="10" max="28" step="1" />
      </div>

      <div class="field">
        <label for="set-curve">フローチャートの線の形</label>
        <select id="set-curve">
          <option value="basis">曲線</option>
          <option value="linear">直線</option>
          <option value="step">段差</option>
          <option value="natural">なめらか</option>
        </select>
      </div>

      <div class="field">
        <label for="set-look">描画スタイル</label>
        <select id="set-look">
          <option value="classic">標準</option>
          <option value="handDrawn">手書き風</option>
          <option value="neo">ネオ</option>
        </select>
      </div>

      <details class="advanced">
        <summary>詳細設定</summary>

        <div class="field">
          <label for="set-node-spacing">
            ノード間隔
            <span id="node-spacing-value" class="field-value"></span>
          </label>
          <input
            id="set-node-spacing"
            type="range"
            min="10"
            max="100"
            step="5"
          />
        </div>

        <div class="field">
          <label for="set-rank-spacing">
            ランク間隔
            <span id="rank-spacing-value" class="field-value"></span>
          </label>
          <input
            id="set-rank-spacing"
            type="range"
            min="10"
            max="100"
            step="5"
          />
        </div>

        <div class="field">
          <label for="set-diagram-padding">
            図の余白
            <span id="diagram-padding-value" class="field-value"></span>
          </label>
          <input
            id="set-diagram-padding"
            type="range"
            min="0"
            max="40"
            step="2"
          />
        </div>

        <div class="field">
          <label for="set-font">図のフォント</label>
          <select id="set-font">
            <option value="default">標準</option>
            <option value="sans">本文</option>
            <option value="mono">コード</option>
          </select>
        </div>
      </details>

      <div class="drawer-foot">
        <button id="set-reset" type="button" class="btn btn-ghost">
          <span class="btn-icon" data-icon="rotate-ccw"></span>
          デフォルトに戻す
        </button>
      </div>
    </aside>

    <!-- 出力モーダル -->
    <div id="export-backdrop" class="modal-backdrop" hidden></div>
    <div
      id="export-modal"
      class="modal"
      hidden
      tabindex="-1"
      role="dialog"
      aria-modal="true"
      aria-label="画像を出力"
    >
      <div class="modal-head">
        <h2>画像を出力</h2>
        <button
          id="export-close"
          type="button"
          class="icon-btn"
          data-icon="x"
          aria-label="閉じる"
        ></button>
      </div>

      <div class="modal-body">
        <div class="export-preview">
          <div id="export-canvas" class="export-canvas"></div>
        </div>

        <div class="export-controls">
          <div class="control-group">
            <span class="control-label">形式</span>
            <div class="seg" id="export-format" role="group" aria-label="形式">
              <button type="button" class="seg-item" data-value="svg">
                SVG
              </button>
              <button type="button" class="seg-item" data-value="png">
                PNG
              </button>
            </div>
          </div>

          <div class="control-group">
            <span class="control-label">背景</span>
            <div class="seg" id="export-bg" role="group" aria-label="背景">
              <button type="button" class="seg-item" data-value="auto">
                テーマ
              </button>
              <button type="button" class="seg-item" data-value="white">
                白
              </button>
              <button type="button" class="seg-item" data-value="dark">
                ダーク
              </button>
              <button type="button" class="seg-item" data-value="transparent">
                透明
              </button>
            </div>
          </div>

          <div class="control-group">
            <span class="control-label">余白</span>
            <div class="seg" id="export-pad" role="group" aria-label="余白">
              <button type="button" class="seg-item" data-value="0">
                なし
              </button>
              <button type="button" class="seg-item" data-value="16">小</button>
              <button type="button" class="seg-item" data-value="32">中</button>
              <button type="button" class="seg-item" data-value="64">大</button>
            </div>
          </div>

          <div class="control-group" id="export-scale-group">
            <span class="control-label">PNG 解像度</span>
            <div
              class="seg"
              id="export-scale"
              role="group"
              aria-label="PNG 解像度"
            >
              <button type="button" class="seg-item" data-value="1">1x</button>
              <button type="button" class="seg-item" data-value="2">2x</button>
              <button type="button" class="seg-item" data-value="3">3x</button>
            </div>
          </div>

          <div class="control-group">
            <label class="control-label" for="export-filename"
              >ファイル名</label
            >
            <div class="filename-field">
              <input
                id="export-filename"
                class="filename-input"
                type="text"
                value="diagram"
                spellcheck="false"
                autocomplete="off"
                aria-label="ファイル名"
              />
              <span class="filename-ext" id="export-ext">.png</span>
            </div>
          </div>
        </div>
      </div>

      <div class="modal-foot">
        <span class="foot-hint" id="export-hint"></span>
        <div class="format-actions">
          <button id="export-copy" type="button" class="btn btn-ghost">
            <span class="btn-icon" data-icon="copy"></span>
            <span class="copy-label">コピー</span>
          </button>
          <button id="export-download" type="button" class="btn">
            <span class="btn-icon" data-icon="download"></span>
            ダウンロード
          </button>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
